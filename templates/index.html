<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasifikasi Fashion MNIST - UTS KB</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        .upload-area {
            border: 2px dashed #007bff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover { background-color: #e7f1ff; }
        input[type="file"] { margin-bottom: 15px; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #d4edda;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
        }
        .prediction-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #155724;
            display: block;
        }
        .footer { margin-top: 20px; font-size: 0.8em; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <h2>Fashion Classifier</h2>
    <p>Unggah gambar pakaian (Fashion MNIST) untuk diprediksi oleh AI.</p>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <div class="upload-area">
            <input type="file" name="file" accept="image/*" required>
        </div>
        <button type="submit">Mulai Prediksi</button>
    </form>

    {% if prediction %}
    <div class="result-box">
        <span style="color: #155724;">Hasil Analisis:</span>
        <span class="prediction-text">{{ prediction }}</span>
    </div>
    {% endif %}

    <div class="footer">
        UTS Kecerdasan Buatan - Politeknik eLBajo Commodus
    </div>
</div>

</body>
</html>
